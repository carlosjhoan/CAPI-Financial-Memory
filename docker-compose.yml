version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: pfm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-StrongP@ssw0rd}
      POSTGRES_DB: pfm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pfm-net

volumes:
  postgres_data:

networks:
  pfm-net:
    driver: bridge
