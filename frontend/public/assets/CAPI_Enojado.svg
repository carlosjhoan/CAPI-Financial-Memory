<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- face -->
  <circle cx="32" cy="32" r="30" fill="#f87171" stroke="#ef4444" stroke-width="1.5"/>
  <!-- ears -->
  <ellipse cx="18" cy="10" rx="6" ry="8" fill="#f87171" stroke="#ef4444" stroke-width="1.5"/>
  <ellipse cx="46" cy="10" rx="6" ry="8" fill="#f87171" stroke="#ef4444" stroke-width="1.5"/>
  <!-- angry eyebrows -->
  <line x1="15" y1="22" x2="28" y2="27" stroke="#7f1d1d" stroke-width="3" stroke-linecap="round"/>
  <line x1="49" y1="22" x2="36" y2="27" stroke="#7f1d1d" stroke-width="3" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="22" cy="31" r="3.5" fill="#7f1d1d"/>
  <circle cx="42" cy="31" r="3.5" fill="#7f1d1d"/>
  <!-- frown -->
  <path d="M23 46 Q32 39 41 46" fill="none" stroke="#7f1d1d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- anger marks / vein -->
  <line x1="10" y1="18" x2="14" y2="16" stroke="#7f1d1d" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="54" y1="18" x2="50" y2="16" stroke="#7f1d1d" stroke-width="2.5" stroke-linecap="round"/>
</svg>
