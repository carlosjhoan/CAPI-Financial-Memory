<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- face -->
  <circle cx="32" cy="32" r="30" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- ears -->
  <ellipse cx="18" cy="10" rx="6" ry="8" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
  <ellipse cx="46" cy="10" rx="6" ry="8" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- left eyebrow (normal) -->
  <line x1="18" y1="22" x2="28" y2="24" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
  <!-- right eyebrow (raised) -->
  <line x1="36" y1="19" x2="46" y2="21" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="23" cy="30" r="3.5" fill="#78350f"/>
  <circle cx="41" cy="29" r="3.5" fill="#78350f"/>
  <!-- skeptical mouth -->
  <path d="M23 43 Q32 38 41 43" fill="none" stroke="#78350f" stroke-width="2.5" stroke-linecap="round"/>
</svg>
